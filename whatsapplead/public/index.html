<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsAppLead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <main class="app-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Unified Pipeline</p>
                <h1>WhatsAppLead Contacts</h1>
                <p class="sub">Scrape WhatsApp Web chats and sync directly into your existing leads database.</p>
            </div>
            <button id="syncButton" class="sync-btn">Sync WhatsApp</button>
        </header>

        <section class="stats" id="stats"></section>

        <section class="workspace">
            <aside class="left-panel">
                <div class="left-panel-head">
                    <h2>Contacts</h2>
                    <input id="searchInput" type="search" placeholder="Search name, phone, label..." />
                </div>
                <div id="contactList" class="contact-list"></div>
            </aside>

            <section class="detail-panel" id="detailPanel">
                <div class="empty-state">
                    <h3>Select a contact</h3>
                    <p>Choose a contact from the list to see labels and last 5 chat messages.</p>
                </div>
            </section>
        </section>
    </main>

    <script type="module" src="/app.js"></script>
</body>

</html>
